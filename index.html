<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saturn Gesture System</title>
    <link rel="stylesheet" href="/styles/main.css">
</head>
<body>
    <video id="video-input" playsinline muted autoplay></video>
    <div id="canvas-container"></div>
    <div id="ui-layer"><div id="message-box">等待手势指令...</div></div>

    <div id="bottom-bar">
        <div id="status-indicator">
            <div class="dot" id="status-dot"></div>
            <span id="status-text">初始化...</span>
        </div>
        <select id="camera-select">
            <option value="" disabled selected>查找摄像头...</option>
        </select>
        <button id="camera-toggle">暂停捕捉</button>
    </div>

    <!-- Camera PiP overlay -->
    <canvas id="pip-canvas"></canvas>

    <div id="controls-hint">左键旋转 / 右键平移 / 滚轮缩放<br>空格键暂停 / 恢复手势</div>
    <div id="version-badge">v2.3.2</div>
    <div id="save-toast">配置已保存！下次刷新将保持此状态</div>

    <div id="audio-hint">
        <h2 style="margin-top:0; font-weight:300;">开启星际之旅</h2>
        <p style="opacity:0.8; margin-bottom:0;">点击启动 BGM 与交互</p>
    </div>

    <button id="fullscreen-btn">全屏沉浸</button>

    <!-- Image manager -->
    <input type="file" id="image-upload" accept="image/*" multiple style="display:none">
    <button id="upload-btn" type="button">图片管理</button>
    <div id="upload-count">暂无已保存图片</div>
    <div id="image-manager-overlay" aria-hidden="true">
        <div class="image-manager-panel" role="dialog" aria-modal="true" aria-labelledby="image-manager-title">
            <div class="image-manager-header">
                <div>
                    <div class="image-manager-kicker">照片管理器</div>
                    <h2 id="image-manager-title">管理本地图片缓存</h2>
                    <p class="image-manager-subtitle">在这里添加、排序、删除图片。刷新后仍会保留在当前浏览器里。</p>
                </div>
                <button type="button" class="image-manager-close" data-role="close-manager">关闭</button>
            </div>
            <div class="image-manager-toolbar">
                <div class="image-manager-toolbar__left">
                    <span data-role="draft-count">0 张</span>
                    <span data-role="dirty-state">实时保存</span>
                </div>
                <div class="image-manager-toolbar__right">
                    <button type="button" data-role="upload-btn">上传更多图片</button>
                    <button type="button" data-role="clear-btn" class="secondary">清空全部</button>
                </div>
            </div>
            <div class="image-manager-empty" data-role="empty-state" hidden>
                还没有图片。先上传一些照片，再来调整顺序。
            </div>
            <div class="image-manager-grid" data-role="draft-list"></div>
            <div class="image-manager-footer">
                <button type="button" class="secondary" data-role="close-manager">完成</button>
            </div>
        </div>
    </div>

    <!-- MediaPipe Hands — served locally, no CDN latency -->
    <script src="/mediapipe/hands/hands.js"></script>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
